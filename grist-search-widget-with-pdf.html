<style>
  :root {
    --ink:       #1c1f26;
    --ink-soft:  #4a5060;
    --ink-muted: #8c92a0;
    --rule:      #e4e6eb;
    --bg:        #f5f5f2;
    --surface:   #ffffff;
    --amber:     #c8800a;
    --amber-dim: #f5e6cc;
    --green:     #2a7a4b;
    --radius:    10px;
    --shadow:    0 1px 4px rgba(28,31,38,0.08), 0 4px 16px rgba(28,31,38,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 20px;
  }

  /* SEARCH */
  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    align-items: center;
  }

  .search-box {
    position: relative;
    flex: 1;
  }

  .search-box svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-muted);
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    padding: 13px 42px 13px 44px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--ink);
    background: var(--surface);
    border: 1.5px solid var(--rule);
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    box-shadow: var(--shadow);
  }

  #searchInput:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 3px var(--amber-dim);
  }

  #searchInput::placeholder { color: var(--ink-muted); }

  .clear-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--rule);
    border: none;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    cursor: pointer;
    color: var(--ink-soft);
    font-size: 13px;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background 0.12s;
    line-height: 1;
  }
  .clear-btn:hover { background: #d0d3da; }
  .clear-btn.show { display: flex; }

  .count-badge {
    font-size: 13px;
    color: var(--ink-muted);
    white-space: nowrap;
    font-weight: 400;
  }

  .count-badge strong { color: var(--ink); font-weight: 600; }

  /* RESULTS */
  .results { display: flex; flex-direction: column; gap: 10px; }

  /* CARD */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--rule);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
  }

  .card:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(28,31,38,0.10), 0 8px 28px rgba(28,31,38,0.08);
    border-color: var(--amber);
  }

  .card.expanded .card-body { display: flex; }

  .card-head {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: var(--ink);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    flex-shrink: 0;
    letter-spacing: -0.5px;
  }

  .head-text { flex: 1; min-width: 0; }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-hint {
    font-size: 12.5px;
    color: var(--ink-muted);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .expand-icon {
    color: var(--ink-muted);
    font-size: 18px;
    transition: transform 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }

  .card.expanded .expand-icon { transform: rotate(180deg); }

  /* CARD BODY */
  .card-body {
    display: none;
    flex-direction: column;
    gap: 0;
    border-top: 1px solid var(--rule);
    padding: 0;
  }

  .field-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 9px 18px;
    border-bottom: 1px solid #f0f1f4;
  }

  .field-row:last-child { border-bottom: none; }

  .field-row:nth-child(even) { background: #fafafa; }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--amber);
    min-width: 110px;
    flex-shrink: 0;
  }

  .field-value {
    font-size: 14px;
    color: var(--ink);
    line-height: 1.5;
    word-break: break-word;
  }

  .field-value a {
    color: var(--green);
    text-decoration: none;
    border-bottom: 1px solid rgba(42,122,75,0.25);
    transition: border-color 0.12s;
  }

  .field-value a:hover { border-color: var(--green); }

  /* HIGHLIGHT */
  mark {
    background: #fff0b0;
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* STATES */
  .state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-muted);
  }

  .state-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }

  .state h3 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .state p { font-size: 14px; line-height: 1.6; }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--rule);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.65s linear infinite;
    margin: 0 auto 14px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* NO DATA NOTICE */
  .no-data {
    background: var(--amber-dim);
    border: 1.5px solid #e8c96e;
    border-radius: var(--radius);
    padding: 16px 20px;
    font-size: 14px;
    color: #7a5a10;
    line-height: 1.6;
    margin-bottom: 16px;
  }

.pdf-btn {
  background: #2a7a4b;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 10px 16px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
}
.pdf-btn:hover { opacity: 0.9; }

</style>
</head>
<body>

<div class="search-row">
  <div class="search-box">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search by name, company, phone…" oninput="onSearch()" />
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
  <div class="count-badge" id="countBadge"></div>
</div>

<div id="noDataNotice" class="no-data" style="display:none">
  ⚠️ <strong>No data columns selected.</strong> In the Grist panel on the right, click <strong>"Select columns"</strong> under this widget and choose which fields to show.
</div>

<div id="resultsArea">
  <div class="state">
    <div class="spinner"></div>
    <p>Connecting to Grist…</p>
  </div>
</div>

<script>

  console.log("SCRIPT LOADED");
  alert("SCRIPT LOADED");
  
  let allRecords = [];
  let columns = [];
  let searchTimer = null;
  let expandedId = null;

  // ── GRIST INIT ─────────────────────────────────────────────────────────────
  grist.ready({
    requiredAccess: 'read table',
    columns: [], // accept any columns
  });

  grist.onRecords(function(records, mappings) {
    // records is an array of objects with field values
    allRecords = records;

    // derive column keys from first record
    if (records.length > 0) {
      columns = Object.keys(records[0]).filter(k => k !== 'id' && !k.startsWith('_'));
    }

    if (columns.length === 0) {
      document.getElementById('noDataNotice').style.display = 'block';
    } else {
      document.getElementById('noDataNotice').style.display = 'none';
    }

    const q = document.getElementById('searchInput').value.trim();
    renderResults(filterRecords(allRecords, q.toLowerCase()), q);
  });

  // ── SEARCH ─────────────────────────────────────────────────────────────────
  function onSearch() {
    const q = document.getElementById('searchInput').value;
    document.getElementById('clearBtn').classList.toggle('show', q.length > 0);
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      const filtered = filterRecords(allRecords, q.trim().toLowerCase());
      renderResults(filtered, q.trim());
    }, 150);
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('clearBtn').classList.remove('show');
    renderResults(allRecords, '');
  }

  function filterRecords(records, q) {
    if (!q) return records;
    return records.filter(r =>
      columns.some(k => String(r[k] ?? '').toLowerCase().includes(q))
    );
  }

  // ── RENDER ─────────────────────────────────────────────────────────────────
  function renderResults(records, query) {
    const area = document.getElementById('resultsArea');
    const badge = document.getElementById('countBadge');
    const total = allRecords.length;

    if (allRecords.length === 0) {
      badge.innerHTML = '';
      area.innerHTML = `<div class="state"><div class="spinner"></div><p>Loading…</p></div>`;
      return;
    }

    if (records.length === 0) {
      badge.innerHTML = `<strong>0</strong> of ${total}`;
      area.innerHTML = `
        <div class="state">
          <div class="state-icon">🔍</div>
          <h3>No matches</h3>
          <p>Try a different search term.</p>
        </div>`;
      return;
    }

    badge.innerHTML = query
      ? `<strong>${records.length}</strong> of ${total}`
      : `<strong>${total}</strong> records`;

    const frag = document.createDocumentFragment();
    records.forEach(r => frag.appendChild(buildCard(r, query)));

    area.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'results';
    grid.appendChild(frag);
    area.appendChild(grid);
  }

  function buildCard(record, query) {
    const id = record.id;

    // Pick best "name" field
    const nameKey = columns.find(k =>
      /^name$/i.test(k) || /company/i.test(k) || /firm/i.test(k) ||
      /contractor/i.test(k) || /architect/i.test(k) || /title/i.test(k) ||
      /project/i.test(k) || /school/i.test(k) || /board/i.test(k)
    ) || columns[0];

    const nameVal = record[nameKey] ?? '—';
    const initials = String(nameVal).split(/\s+/).map(w => w[0]).filter(Boolean).slice(0,2).join('').toUpperCase() || '?';

    // Hint line: first field that isn't the name and has a value
    const hintKey = columns.find(k => k !== nameKey && record[k]);
    const hintVal = hintKey ? record[hintKey] : '';

    const isExpanded = expandedId === id;

    const card = document.createElement('div');
    card.className = 'card' + (isExpanded ? ' expanded' : '');
    card.innerHTML = `
      <div class="card-head">
        <div class="avatar">${esc(initials)}</div>
        <div class="head-text">
          <div class="card-name">${highlight(esc(String(nameVal)), query)}</div>
          ${hintVal ? `<div class="card-hint">${highlight(esc(String(hintVal)), query)}</div>` : ''}
        </div>
        <div class="expand-icon">▾</div>
      </div>
      <div class="card-body">
        ${columns.filter(k => {
          const v = record[k];
          return v !== null && v !== undefined && v !== '';
        }).map(k => {
          const v = record[k];
          return `
            <div class="field-row">
              <span class="field-label">${esc(friendly(k))}</span>
              <span class="field-value">${formatVal(k, v, query)}</span>
            </div>`;
        }).join('')}
        <div class="field-row">
          <button class="pdf-btn">Generate Work Order PDF</button>
        </div>
      </div>`;

    card.querySelector('.card-head').addEventListener('click', () => toggleCard(id));

    const pdfBtn = card.querySelector('.pdf-btn');
    if (pdfBtn) {
      pdfBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        await generatePDF(record);
      });
    }
    return card;
  }

  function toggleCard(id) {
    expandedId = expandedId === id ? null : id;
    const q = document.getElementById('searchInput').value.trim();
    renderResults(filterRecords(allRecords, q.toLowerCase()), q);
  }

  // ── HELPERS ────────────────────────────────────────────────────────────────
  function formatVal(key, val, query) {
    const s = String(val);
    if (/email/i.test(key) && s.includes('@'))
      return `<a href="mailto:${esc(s)}">${highlight(esc(s), query)}</a>`;
    if (/phone|tel|fax|cell|mobile/i.test(key))
      return `<a href="tel:${esc(s.replace(/\D/g,''))}">${highlight(esc(s), query)}</a>`;
    if (/url|web|site|http/i.test(key) || s.startsWith('http'))
      return `<a href="${esc(s)}" target="_blank" rel="noopener">${highlight(esc(s.replace(/^https?:\/\//,'')), query)}</a>`;
    return highlight(esc(s), query);
  }

  function friendly(key) {
    return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function highlight(text, query) {
    if (!query) return text;
    const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return text.replace(new RegExp(`(${safe})`, 'gi'), '<mark>$1</mark>');
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  // -------------------------------------------------------------------------------------------------098
  async function generatePDF(record) {

  alert("PDF button works");

  try {

    const existingPdfBytes =
      await fetch("./template.pdf")
      .then(r => r.arrayBuffer());

    const pdfDoc =
      await PDFLib.PDFDocument.load(existingPdfBytes);

    const page = pdfDoc.getPages()[0];

    page.drawText("TEST", {
      x: 100,
      y: 100,
      size: 50
    });

    const pdfBytes = await pdfDoc.save();

    const blob =
      new Blob([pdfBytes], {
        type: "application/pdf"
      });

    const url =
      URL.createObjectURL(blob);

    window.open(url);

  } catch(err) {

    alert(err.message);

    console.error(err);

  }
}
